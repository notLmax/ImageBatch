name: Build macOS App

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build app with PyInstaller
        run: |
          rm -rf build/ dist/
          pyinstaller ImageBatch.spec --noconfirm

      - name: Ad-hoc codesign
        run: codesign --force --deep --sign - dist/ImageBatch.app

      - name: Build DMG
        run: |
          DMG_STAGING=$(mktemp -d)
          cp -R dist/ImageBatch.app "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"
          hdiutil create \
            -volname "ImageBatch Installer" \
            -srcfolder "$DMG_STAGING" \
            -ov \
            -format UDZO \
            dist/ImageBatch.dmg
          rm -rf "$DMG_STAGING"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageBatch-dmg
          path: dist/ImageBatch.dmg

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}-${{ github.sha }}
          name: ImageBatch v${{ github.run_number }}
          files: dist/ImageBatch.dmg
          generate_release_notes: true
